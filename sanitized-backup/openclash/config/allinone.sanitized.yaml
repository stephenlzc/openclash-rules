---
port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
proxy-providers:
  红杏云:
    type: http
    url: https://redacted.invalid/subscription
    interval: 3600
    proxy: DIRECT
    path: "./providers/Provider_765D6A.yaml"
    exclude-filter: "(?i)(到期)|(套餐)|(邮箱)|(异常)|(更新)|(订阅)|(TG)|(tg)|(Tg)|(地址)|(ipv6)|(IPV6)|(Ipv6)|(IPv6)|(过期时间)|(剩余流量)|(TG群)|(官网)"
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
    override:
      skip-cert-verify: true
      udp: true
  GW树洞:
    type: http
    url: https://redacted.invalid/subscription
    interval: 3600
    proxy: DIRECT
    path: "./providers/Provider_2A1B22.yaml"
    exclude-filter: "(?i)(到期)|(套餐)|(邮箱)|(异常)|(更新)|(订阅)|(TG)|(tg)|(Tg)|(地址)|(ipv6)|(IPV6)|(Ipv6)|(IPv6)|(过期时间)|(剩余流量)|(TG群)|(官网)"
    health-check:
