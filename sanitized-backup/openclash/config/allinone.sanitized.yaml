      interval: 300
    override:
      skip-cert-verify: true
      udp: true
  UUone:
    type: http
    url: https://redacted.invalid/subscription
    interval: 3600
    proxy: DIRECT
    path: "./providers/Provider_F500F0.yaml"
    exclude-filter: "(?i)(到期)|(套餐)|(邮箱)|(异常)|(更新)|(订阅)|(TG)|(tg)|(Tg)|(地址)|(ipv6)|(IPV6)|(Ipv6)|(IPv6)|(过期时间)|(剩余流量)|(TG群)|(官网)"
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
    override:
      skip-cert-verify: true
      udp: true
proxy-groups:
- name: "\U0001F30F 台湾/新加坡 AI"
  type: fallback
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - TW 台湾节点
  - "\U0001F1F8\U0001F1EC 新加坡节点"
- name: "\U0001F1FA\U0001F1F8 美国 AI"
  type: fallback
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - "\U0001F1FA\U0001F1F8 美国节点"
- name: "\U0001F1ED\U0001F1F0 香港"
  type: fallback
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - "\U0001F1ED\U0001F1F0 香港节点"
- name: "\U0001F4DD Typeless"
  type: fallback
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - "\U0001F1ED\U0001F1F0 香港"
  - "\U0001F1FA\U0001F1F8 美国 AI"
- name: "\U0001F6D2 台湾 Shopee"
  type: fallback
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - TW 台湾节点
- name: "\U0001F1FA\U0001F1F8\U0001F1E8\U0001F1E6\U0001F1EA\U0001F1FA\U0001F1EC\U0001F1E7
    欧美地区"
  type: select
  proxies:
  - "\U0001F1FA\U0001F1F8 美国节点"
  - "\U0001F1E8\U0001F1E6 加拿大节点"
  - "\U0001F1EC\U0001F1E7 英国节点"
  - "\U0001F1EB\U0001F1F7 法国节点"
  - "\U0001F1E9\U0001F1EA 德国节点"
  - "\U0001F1F3\U0001F1F1 荷兰节点"
- name: "\U0001F310 其他节点"
  type: select
  proxies:
  - "\U0001F1ED\U0001F1F0 香港"
  - "\U0001F310 其他地区"
  - "♻️ 自动选择"
- name: "\U0001F680 手动选择"
  type: select
  use: &1
  - 红杏云
  - GW树洞
  - UUone
  proxies:
  - "\U0001F1ED\U0001F1F0 香港"
  - "\U0001F30F 台湾/新加坡 AI"
  - "\U0001F1FA\U0001F1F8 美国 AI"
  - "\U0001F1FA\U0001F1F8\U0001F1E8\U0001F1E6\U0001F1EA\U0001F1FA\U0001F1EC\U0001F1E7
    欧美地区"
  - "\U0001F310 其他节点"
  - "\U0001F3AF 全球直连"
- name: "♻️ 自动选择"
  type: url-test
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50
  use: *1
- name: "\U0001F1ED\U0001F1F0 香港节点"
  type: url-test
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50
  filter: "(\U0001F1ED\U0001F1F0|港|\\bHK\\b|Hong Kong|HongKong|HONG KONG|HKG|九龙|Kowloon)"
  use: *1
- name: "\U0001F1FA\U0001F1F8 美国节点"
  type: url-test
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50
  filter: "(\U0001F1FA\U0001F1F8|美|\\bUS\\b|United States|USA|America|洛杉矶|圣何塞|纽约|西雅图|LAX|SFO|SEA|NYC)"
  use: *1
- name: TW 台湾节点
  type: url-test
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50
  filter: "(台|\\bTW\\b|Taiwan|TWN|TPE)"
  use: *1
- name: "\U0001F1F8\U0001F1EC 新加坡节点"
  type: url-test
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50
  filter: "(\U0001F1F8\U0001F1EC|新加坡|狮城|\\bSG\\b|Singapore|SIN)"
  use: *1
- name: "\U0001F1E8\U0001F1E6 加拿大节点"
  type: url-test
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50
  filter: "(\U0001F1E8\U0001F1E6|加拿大|\\bCA\\b|Canada|CAN|温哥华|多伦多|YVR|YYZ)"
  use: *1
- name: "\U0001F1EC\U0001F1E7 英国节点"
  type: url-test
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50
  filter: "(\U0001F1EC\U0001F1E7|英国|\\bUK\\b|United Kingdom|Britain|London|伦敦|GBR)"
  use: *1
- name: "\U0001F1EB\U0001F1F7 法国节点"
  type: url-test
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50
  filter: "(\U0001F1EB\U0001F1F7|法国|\\bFR\\b|France|巴黎|FRA)"
  use: *1
- name: "\U0001F1E9\U0001F1EA 德国节点"
  type: url-test
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50
  filter: "(\U0001F1E9\U0001F1EA|德国|\\bDE\\b|Germany|法兰克福|柏林|DEU)"
  use: *1
- name: "\U0001F1F3\U0001F1F1 荷兰节点"
  type: url-test
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50
  filter: "(\U0001F1F3\U0001F1F1|荷兰|\\bNL\\b|Netherlands|阿姆斯特丹|AMS)"
  use: *1
- name: "\U0001F310 其他地区"
  type: url-test
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50
  filter: "^(?!.*(港|HK|Hong Kong|美国|US|USA|日本|JP|新加坡|SG|台湾|TW|加拿大|CA|英国|UK|法国|FR|德国|DE|荷兰|NL)).*"
  use: *1
- name: "\U0001F3AF 全球直连"
  type: select
  proxies:
  - DIRECT
rules:
